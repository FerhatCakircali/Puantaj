name: iOS Build

on:
  push:
    branches: [ main, feature/optimization-phase-3 ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS App
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: 'stable'
      
      - name: Create .env file
        run: |
          cp .env.example .env || echo "SUPABASE_URL=dummy" > .env
          echo "SUPABASE_ANON_KEY=dummy" >> .env
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign
      
      - name: Create IPA archive
        run: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r ios-runner-app.zip Payload
          mv ios-runner-app.zip ../../..
      
      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-runner-app
          path: ios-runner-app.zip
          retention-days: 7
